name: 🌦️ Automasi Pemantau Cuaca Laluan

on:
  schedule:
    # Berjalan secara automatik setiap 6 jam
    - cron: '0 */6 * * *'
  workflow_dispatch: # Membolehkan abang tekan butang 'Run workflow' secara manual bila-bila masa

permissions:
  contents: write

jobs:
  weather_job:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Ambil Kod Repo
      uses: actions/checkout@v4
    
    - name: 🐍 Sediakan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 📦 Pasang Modul Zon Masa
      run: pip install pytz
    
    - name: ⚙️ Jalankan Skrip Cuaca Python
      run: python semak_cuaca.py
    
    - name: 💾 Simpan Laporan Cuaca Baharu
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add LOG_CUACA.md
        git commit -m "🌦️ Automasi: Log widget cuaca terkini dikemas kini" || echo "Tiada perubahan data cuaca"
        git pull --rebase origin main || echo "Tiada perubahan di remote"
        git push origin main
