name: 🤖 Automasi Profil Utama

on:
  schedule:
    # Jadual Automasi: Berjalan secara automatik setiap hari pada jam 8:00 Pagi Waktu Malaysia (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: 
    # Arahan Manual: Membolehkan abang tekan butang 'Run workflow' secara manual di GitHub Actions

# Kebenaran Sistem (Permissions): WAJIB ADA! Beri lesen kepada robot untuk menulis dan menyimpan (push) fail
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Ambil Kod Repo
      uses: actions/checkout@v4
    
    - name: 🐍 Sediakan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 📦 Pasang Pakej Sampingan / Timezone
      run: pip install pytz
    
    - name: ⚙️ Jalankan Automasi Python
      run: python update_readme.py
    
    - name: 💾 Simpan Perubahan ke GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add README.md
        git commit -m "🤖 Automasi: Status garaj utama dikemas kini" || echo "Tiada perubahan untuk di-commit"
        git pull --rebase origin main || echo "Tiada perubahan di remote untuk di-rebase"
        git push origin main